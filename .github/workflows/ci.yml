name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
  DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run security:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  production:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run security:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run db:validate
      - run: npm run db:generate
      - run: npm run build:production
      - name: Reinstall runtime dependencies only
        run: rm -rf node_modules && npm ci --omit=dev
      - run: npm run validate:production-startup
      - run: npx prisma --version
      - run: npm run smoke:production
        env:
          SMOKE_OMIT_PORT: "true"
