name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://ci@127.0.0.1:5432/ci
  DIRECT_URL: postgresql://ci@127.0.0.1:5432/ci

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run security:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run security:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run db:validate
      - run: npm run db:generate
      - run: npm run build:production
      - run: npm run smoke:production
